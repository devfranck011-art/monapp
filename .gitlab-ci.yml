stages:
  - test
  - quality
  - security
  - build
  - deploy

variables:
  IMAGE_NAME: "$CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG"
  PYTHONPATH: "$CI_PROJECT_DIR"

before_script:
  - python --version

# -------------------- TEST --------------------
test_app:
  stage: test
  image: python:3.11
  cache:
    key: $CI_COMMIT_REF_SLUG
    paths:
      - ~/.cache/pip
  before_script:
    - pip install -r requirements.txt
  script:
    - pytest

# -------------------- LINT --------------------
lint_code:
  stage: quality
  image: python:3.11
  cache:
    key: $CI_COMMIT_REF_SLUG
    paths:
      - ~/.cache/pip
  before_script:
    - pip install -r requirements.txt
  script:
    - flake8 .

# -------------------- SECURITY --------------------
bandit_scan:
  stage: security
  image: python:3.11
  cache:
    key: $CI_COMMIT_REF_SLUG
    paths:
      - ~/.cache/pip
  before_script:
    - pip install -r requirements.txt
    - pip install bandit
  script:
    - bandit -r app run.py

# -------------------- DOCKER BUILD --------------------
docker_build:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build -t $IMAGE_NAME .
    - docker push $IMAGE_NAME
  only:
    - main

# -------------------- DEPLOY --------------------
deploy_app:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -H $SERVER_HOST >> ~/.ssh/known_hosts
  script:
    - ssh $SERVER_USER@$SERVER_HOST "cd /home/$SERVER_USER/urbanhub-park && git pull && docker compose down && docker compose up -d --build"
  only:
    - main